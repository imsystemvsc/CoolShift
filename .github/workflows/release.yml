name: Build and Release

on:
  push:
    tags:
      - 'v*' # Triggers whenever you push a tag that starts with 'v' (like v1.0.0)

permissions:
  contents: write # Required for the release action to upload assets

jobs:
  build:
    name: Build Park Toggle
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET 8.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Publish Executable
      run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:PublishTrimmed=false

    - name: Rename Executable (Optional)
      run: Rename-Item -Path "bin\Release\net8.0-windows\win-x64\publish\ParkToggleWpf.exe" -NewName "ParkToggle.exe"
      
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: bin\Release\net8.0-windows\win-x64\publish\ParkToggle.exe
        generate_release_notes: true
